services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - web
      - oracle-sim

  oracle-sim:
    build:
      context: ..
      dockerfile: infra/oracle.Dockerfile
    ports:
      - "8787:8787"
    environment:
      ORACLE_PORT: 8787
      REDIS_HOST: redis
      REDIS_PASSWORD: "\${REDIS_PASSWORD:-supersecret}"
    depends_on:
      - redis

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_ORACLE_URL: http://localhost:8787
    depends_on:
      - oracle-sim

  redis:
    build:
      context: ..
      dockerfile: infra/redis.Dockerfile
    command: redis-server --requirepass "\${REDIS_PASSWORD:-supersecret}" --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    build:
      context: ..
      dockerfile: infra/postgres.Dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "\${POSTGRES_USER:-aks}"
      POSTGRES_PASSWORD: "\${POSTGRES_PASSWORD:-aks_pass}"
      POSTGRES_DB: "\${POSTGRES_DB:-telemetry}"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redis-data:
  postgres-data:
