services:
  oracle-sim:
    build:
      context: ..
      dockerfile: infra/oracle.Dockerfile
    ports:
      - "8787:8787"
    environment:
      ORACLE_PORT: 8787

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_ORACLE_URL: http://localhost:8787
    depends_on:
      - oracle-sim
