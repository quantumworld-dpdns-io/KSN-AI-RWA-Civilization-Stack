services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - web
      - oracle-sim

  oracle-sim:
    build:
      context: ..
      dockerfile: infra/oracle.Dockerfile
    ports:
      - "8787:8787"
    environment:
      ORACLE_PORT: 8787
      REDIS_HOST: redis
      REDIS_PASSWORD: "\${REDIS_PASSWORD:-supersecret}"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    ports:
      - "5173:3000"
    environment:
      ORACLE_API_URL: http://oracle-sim:8787
    depends_on:
      - oracle-sim
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    build:
      context: ..
      dockerfile: infra/redis.Dockerfile
    command: redis-server --requirepass "\${REDIS_PASSWORD:-supersecret}" --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "\${REDIS_PASSWORD:-supersecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    build:
      context: ..
      dockerfile: infra/postgres.Dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "\${POSTGRES_USER:-aks}"
      POSTGRES_PASSWORD: "\${POSTGRES_PASSWORD:-aks_pass}"
      POSTGRES_DB: "\${POSTGRES_DB:-telemetry}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \${POSTGRES_USER:-aks} -d \${POSTGRES_DB:-telemetry}"]
      interval: 10s
      timeout: 5s
      retries: 3

  chroma:
    image: chromadb/chroma:0.4.24
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma

  qdrant:
    image: qdrant/qdrant:v1.8.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  redis-data:
  postgres-data:
  chroma-data:
  qdrant-data:
