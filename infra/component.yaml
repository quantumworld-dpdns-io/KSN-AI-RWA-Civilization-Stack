# Choreo Component Descriptor
# Deploy this file via: console.choreo.dev → New Component → Existing Dockerfile
# Docs: https://wso2.com/choreo/docs/reference/component-yaml/
apiVersion: core.choreo.dev/v1beta1
kind: Component
metadata:
  name: oracle-redis
  annotations:
    core.choreo.dev/display-name: "Oracle Sim + Redis Sidecar"
    core.choreo.dev/description: >
      Combined oracle-sim (Node.js/HTTP :8787) and Redis (:6379, internal)
      managed by supervisord in a single container for Choreo deployment.

spec:
  type: Service

  # ---- Build configuration ----
  build:
    buildPack:
      name: Dockerfile
      dockerfile:
        # Path is relative to the git repo root
        path: infra/oracle-redis.Dockerfile
        # Docker build context must be the repo root so COPY . . works in builder stage
        dockerContext: .

  # ---- Runtime environment variables ----
  # Sensitive values should be set as Choreo Secrets, not hardcoded here.
  envVars:
    - name: NODE_ENV
      value: production
    - name: REDIS_PASSWORD
      # Override this with a Choreo Secret named REDIS_PASSWORD
      value: "supersecret"
    - name: ORACLE_PORT
      value: "8787"

  # ---- Exposed service ports ----
  service:
    basePath: /
    ports:
      - name: http
        port: 8787
        type: HTTP
        # Set to true if you want Choreo to generate a public endpoint
        schema: openapi.yaml

  # ---- Health probes ----
  probes:
    liveness:
      httpGet:
        path: /health
        port: 8787
      initialDelaySeconds: 15
      periodSeconds: 20
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8787
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3

  # ---- Resource limits (Choreo free-tier defaults) ----
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
