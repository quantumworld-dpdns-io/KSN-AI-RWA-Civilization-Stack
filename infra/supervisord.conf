[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisor/supervisord.pid

; ---- Redis process ----
[program:redis]
; Persistence is disabled so Redis needs no writable disk. Choreo runs the
; container with a read-only root filesystem (and ignores the Dockerfile VOLUME),
; which made AOF crash-loop with "Can't open or create append-only dir
; appendonlydir: Read-only file system". This cache is non-durable by design;
; durable telemetry persistence is intentionally external to this image.
command=redis-server
    --appendonly no
    --save ""
    --requirepass %(ENV_REDIS_PASSWORD)s
    --bind 127.0.0.1
    --protected-mode yes
    --port 6379
    --dir /tmp
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopsignal=TERM
stopasgroup=true
killasgroup=true

; ---- oracle-sim Node.js process ----
; Starts after Redis (priority=20) so Redis is ready to accept connections.
[program:oracle-sim]
command=node /app/packages/oracle-sim/dist/server.js
autostart=true
autorestart=true
priority=20
; REDIS_HOST is localhost because both processes share the same container
environment=
    NODE_ENV="production",
    REDIS_HOST="127.0.0.1",
    REDIS_PORT="6379",
    REDIS_PASSWORD="%(ENV_REDIS_PASSWORD)s",
    ORACLE_PORT="8787"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopsignal=TERM
stopasgroup=true
killasgroup=true
